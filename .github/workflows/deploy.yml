name: Deploy Cocker Run to GitHub Pages

# Baut das Spiel mit pygbag zu WebAssembly und veroeffentlicht es auf GitHub Pages.
on:
  push:
    branches: [main]
  workflow_dispatch:        # erlaubt manuelles Starten im Actions-Tab

permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein Deploy gleichzeitig
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: pygbag installieren
        run: pip install pygbag

      - name: Web-Build erstellen (-> build/web)
        run: pygbag --build main.py

      - name: index.html patchen (BrowserFS-CDN-Fix + devicePixelRatio)
        run: python tools/patch_web.py

      - name: Pages-Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Auf GitHub Pages veroeffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
